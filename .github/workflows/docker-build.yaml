name: Docker Build

permissions: {}

on:
  workflow_call:
    inputs:
      IMAGE_NAME:
        required: true
        type: string
      target:
        required: false
        type: string
        default: ""
      tags:
        description: "Comma-separated Docker tags. Defaults to short SHA, plus main on main."
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      IMAGE_NAME:
        required: true
        type: string
      target:
        required: false
        type: string
        default: ""

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/${{ inputs.IMAGE_NAME }}

jobs:
  docker-build:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest-16core
            arch: linux-amd64
            max_parallelism: 16
          - platform: linux/arm64
            runner: ubuntu-arm-24.04-16core-arm64
            arch: linux-arm64
            max_parallelism: 16
    steps:
      - name: Validate inputs
        env:
          IMAGE_NAME: ${{ inputs.IMAGE_NAME }}
          TARGET: ${{ inputs.target }}
          TAGS_INPUT: ${{ inputs.tags }}
        run: |
          set -euo pipefail

          if [[ "$IMAGE_NAME" != "conduit-op-reth" ]]; then
            echo "::error::Invalid IMAGE_NAME"
            exit 1
          fi

          if [[ -n "$TARGET" && ! "$TARGET" =~ ^[A-Za-z0-9_.-]+$ ]]; then
            echo "::error::Invalid Docker target"
            exit 1
          fi

          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" && -n "$TAGS_INPUT" ]]; then
            echo "::error::Manual Docker tag overrides are not allowed"
            exit 1
          fi

          if [[ -n "$TAGS_INPUT" ]]; then
            IFS=',' read -ra tags <<< "$TAGS_INPUT"
            for tag in "${tags[@]}"; do
              tag="${tag//[[:space:]]/}"
              if [[ -z "$tag" ]]; then
                continue
              fi
              if [[ ! "$tag" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
                echo "::error::Invalid Docker tag: $tag"
                exit 1
              fi
            done
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = ${{ matrix.max_parallelism }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          target: ${{ inputs.target }}
          build-args: |
            BUILD_PROFILE=maxperf
            FEATURES=asm-keccak,jemalloc,keccak-cache-global,otlp,js-tracer
          provenance: false
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=conduit-op-reth-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=conduit-op-reth-${{ matrix.arch }}

      - name: Verify Docker image runs
        env:
          IMAGE: ${{ env.IMAGE }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail

          ref="${IMAGE}@${DIGEST}"
          echo "Pulling and testing image: $ref"
          docker pull "$ref"
          docker run --rm "$ref" --version
          echo "Docker image run check passed!"

      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail

          digest="${DIGEST#sha256:}"
          if [[ ! "$digest" =~ ^[a-f0-9]{64}$ ]]; then
            echo "::error::Invalid build digest: $DIGEST"
            exit 1
          fi

          mkdir -p "${{ runner.temp }}/digests"
          touch "${{ runner.temp }}/digests/${digest}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: docker-build
    permissions:
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tags
        id: tags
        env:
          TAGS_INPUT: ${{ inputs.tags }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          tags="$TAGS_INPUT"
          if [ -z "$tags" ]; then
            short_sha="${SHA:0:7}"
            tags="$short_sha"
            if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              tags="$tags,main"
            fi
          fi

          IFS=',' read -ra resolved_tags <<< "$tags"
          for tag in "${resolved_tags[@]}"; do
            tag="${tag//[[:space:]]/}"
            if [[ -z "$tag" ]]; then
              echo "::error::Empty Docker tag"
              exit 1
            fi
            if [[ ! "$tag" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
              echo "::error::Invalid Docker tag: $tag"
              exit 1
            fi
          done

          echo "tags=$tags" >> "$GITHUB_OUTPUT"

      - name: Create manifest list and push
        env:
          IMAGE: ${{ env.IMAGE }}
          TAGS_INPUT: ${{ steps.tags.outputs.tags }}
          DIGEST_DIR: ${{ runner.temp }}/digests
        run: |
          set -euo pipefail
          shopt -s nullglob

          tag_args=()
          IFS=',' read -ra tags <<< "$TAGS_INPUT"
          for tag in "${tags[@]}"; do
            tag="${tag//[[:space:]]/}"
            if [ -n "$tag" ]; then
              tag_args+=(--tag "${IMAGE}:${tag}")
            fi
          done

          if [ "${#tag_args[@]}" -eq 0 ]; then
            echo "No tags resolved"
            exit 1
          fi

          sources=()
          for digest_file in "$DIGEST_DIR"/*; do
            digest="$(basename "$digest_file")"
            if [[ ! "$digest" =~ ^[a-f0-9]{64}$ ]]; then
              echo "::error::Invalid digest artifact filename: $digest"
              exit 1
            fi
            sources+=("${IMAGE}@sha256:${digest}")
          done

          if [ "${#sources[@]}" -ne 2 ]; then
            echo "::error::Expected 2 digests, got ${#sources[@]}"
            exit 1
          fi

          docker buildx imagetools create "${tag_args[@]}" "${sources[@]}"

      - name: Verify Docker image runs
        env:
          IMAGE: ${{ env.IMAGE }}
          TAGS_INPUT: ${{ steps.tags.outputs.tags }}
        run: |
          set -euo pipefail

          first_tag="${TAGS_INPUT%%,*}"
          first_tag="${first_tag//[[:space:]]/}"
          ref="${IMAGE}:${first_tag}"
          echo "Pulling and testing image: $ref"
          docker pull "$ref"
          docker run --rm "$ref" --version
          echo "Docker image run check passed!"
