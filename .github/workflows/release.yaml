name: Release

on:
  push:
    tags:
      - v*

permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/conduit-op-reth

jobs:
  extract-version:
    name: Extract version
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Extract version
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME}"
          if [[ ! "$version" =~ ^v[0-9A-Za-z][0-9A-Za-z_.-]{0,127}$ ]]; then
            echo "::error::Invalid release tag for Docker tag: $version"
            exit 1
          fi

          echo "VERSION=${version}" >> "$GITHUB_OUTPUT"

          docker_tags="${version}"
          if [[ "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            docker_tags="${docker_tags},latest"
          fi
          echo "DOCKER_TAGS=${docker_tags}" >> "$GITHUB_OUTPUT"
        id: extract_version
    outputs:
      VERSION: ${{ steps.extract_version.outputs.VERSION }}
      DOCKER_TAGS: ${{ steps.extract_version.outputs.DOCKER_TAGS }}

  check-version:
    name: Verify tag matches Cargo.toml
    runs-on: ubuntu-latest
    needs: extract-version
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify crate version matches tag
        env:
          VERSION: ${{ needs.extract-version.outputs.VERSION }}
        run: |
          set -euo pipefail

          tag="${VERSION#v}"
          cargo_ver=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "conduit-op-reth") | .version')
          if [[ "$tag" != "$cargo_ver"* ]]; then
            echo "::error::Tag v${tag} doesn't match Cargo.toml version ${cargo_ver}"
            exit 1
          fi
          echo "Tag v${tag} matches Cargo.toml version ${cargo_ver}"

  docker:
    name: Build and push Docker image
    needs: [extract-version, check-version]
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/docker-build.yaml
    with:
      IMAGE_NAME: conduit-op-reth
      tags: ${{ needs.extract-version.outputs.DOCKER_TAGS }}

  draft-release:
    name: Create draft release
    runs-on: ubuntu-latest
    needs: [docker, extract-version]
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.extract-version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$(git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 ${{ env.VERSION }}^)..${{ env.VERSION }})" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create release draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          body=$(cat <<- ENDBODY
          ## Summary

          TODO: Add a summary of the release.

          ## Docker

          \`\`\`
          docker pull ${{ env.IMAGE }}:${{ env.VERSION }}
          \`\`\`

          ## Changes

          ${{ steps.changelog.outputs.CHANGELOG }}
          ENDBODY
          )

          prerelease_flag=""
          if [[ ! "${{ env.VERSION }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            prerelease_flag="--prerelease"
          fi

          echo "$body" | gh release create --draft $prerelease_flag -t "conduit-op-reth ${{ env.VERSION }}" -F "-" "${{ env.VERSION }}"
